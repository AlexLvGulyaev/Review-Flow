services:
  postgres:
    image: postgres:16-alpine
    container_name: review-flow-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-reviewflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-reviewflow}
      POSTGRES_DB: ${POSTGRES_DB:-reviewflow}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/db/migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./infra/db/migrations/002_seed_data.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
      - ./infra/db/migrations/003_milestone4_prompt_registry.sql:/docker-entrypoint-initdb.d/03_milestone4.sql:ro
      - ./infra/db/migrations/004_milestone5_observability_metadata.sql:/docker-entrypoint-initdb.d/04_milestone5.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-reviewflow} -d ${POSTGRES_DB:-reviewflow}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: review-flow-backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://reviewflow:reviewflow@postgres:5432/reviewflow}
      BACKEND_HOST: ${BACKEND_HOST:-0.0.0.0}
      BACKEND_PORT: ${BACKEND_PORT:-8700}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      PROXYAPI_KEY: ${PROXYAPI_KEY:-}
      PROXYAPI_BASE_URL: ${PROXYAPI_BASE_URL:-https://api.proxyapi.ru/openai/v1}
      GIGACHAT_CLIENT_ID: ${GIGACHAT_CLIENT_ID:-}
      GIGACHAT_CLIENT_SECRET: ${GIGACHAT_CLIENT_SECRET:-}
      GIGACHAT_AUTH_KEY: ${GIGACHAT_AUTH_KEY:-}
      GIGACHAT_SCOPE: ${GIGACHAT_SCOPE:-GIGACHAT_API_PERS}
      GIGACHAT_MODEL: ${GIGACHAT_MODEL:-GigaChat-Max}
      GIGACHAT_MAX_TOKENS: ${GIGACHAT_MAX_TOKENS:-500}
      PHRASE_MATCH_THRESHOLD: ${PHRASE_MATCH_THRESHOLD:-55}
    ports:
      - "8700:8700"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8700/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: review-flow-frontend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8700}
    ports:
      - "5180:5173"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
